<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Галерея · Try-On</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#0a0a0a;--sf:#141414;--sf2:#1c1c1c;--bd:#2a2a2a;--ac:#e8ff6b;--adim:rgba(232,255,107,.1);--tx:#f0f0f0;--mt:#666;--r:12px;--gr:#4ade80;--rd:#f87171}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,sans-serif;min-height:100dvh;padding:24px 16px 48px}
header{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto 20px;flex-wrap:wrap;gap:10px}
.logo{font-size:15px;font-weight:600}.logo span{color:var(--ac)}
.header-right{display:flex;gap:8px;align-items:center}
.upload-link{font-size:12px;color:var(--ac);text-decoration:none;border:1px solid var(--ac);padding:5px 12px;border-radius:100px;opacity:.8}
.delete-all-btn{font-size:12px;color:var(--rd);border:1px solid rgba(248,113,113,.3);background:transparent;padding:5px 12px;border-radius:100px;cursor:pointer}
.delete-all-btn:hover{background:rgba(248,113,113,.1)}

/* Toolbar */
.toolbar{max-width:1200px;margin:0 auto 16px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.filter-btn{padding:5px 14px;border-radius:100px;border:1px solid var(--bd);background:transparent;color:var(--mt);font-size:12px;cursor:pointer;transition:all .2s}
.filter-btn.active{background:var(--adim);border-color:var(--ac);color:var(--ac)}
.count{margin-left:auto;background:var(--sf2);border:1px solid var(--bd);padding:4px 12px;border-radius:100px;font-size:12px;color:var(--mt)}

/* Try-On bar — появляется когда выбраны фото */
.tryon-bar{max-width:1200px;margin:0 auto 16px;background:var(--sf);border:1px solid rgba(232,255,107,.25);border-radius:var(--r);padding:14px 16px;display:none;gap:12px;flex-wrap:wrap;align-items:flex-end}
.tryon-bar.show{display:flex}
.bar-info{font-size:13px;font-weight:500;color:var(--ac);white-space:nowrap;padding-top:6px}
.bar-prompt{flex:1;min-width:200px;display:flex;flex-direction:column;gap:6px}
.bar-prompt label{font-size:11px;color:var(--mt);font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.prompt-input{background:var(--sf2);border:1px solid var(--bd);border-radius:8px;padding:9px 12px;color:var(--tx);font-size:13px;width:100%;resize:none;height:60px;font-family:inherit}
.prompt-input:focus{outline:none;border-color:var(--ac)}
.bar-actions{display:flex;flex-direction:column;gap:6px;flex-shrink:0}
.run-btn{padding:10px 20px;background:var(--ac);color:#0a0a0a;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:6px}
.run-btn:disabled{opacity:.4;cursor:not-allowed}
.clear-sel-btn{padding:8px 14px;background:transparent;color:var(--mt);border:1px solid var(--bd);border-radius:10px;font-size:12px;cursor:pointer;text-align:center}

/* Grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;max-width:1200px;margin:0 auto}
.card{background:var(--sf);border:1.5px solid var(--bd);border-radius:var(--r);overflow:hidden;position:relative;cursor:pointer;transition:border-color .15s,transform .1s}
.card:hover{border-color:#555}
.card.selected{border-color:var(--ac);box-shadow:0 0 0 2px var(--adim)}
.card:hover .card-actions{opacity:1}
.card img.thumb{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:var(--sf2)}
.select-indicator{position:absolute;top:8px;left:8px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.6);border:1.5px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s}
.card.selected .select-indicator{background:var(--ac);border-color:var(--ac);color:#0a0a0a;font-weight:700}
.card-actions{position:absolute;top:8px;right:8px;opacity:0;transition:opacity .2s}
.del-btn{width:26px;height:26px;border-radius:50%;background:rgba(0,0,0,.75);border:1px solid rgba(248,113,113,.3);color:var(--rd);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.del-btn:hover{background:rgba(248,113,113,.2)}
.card-info{padding:8px 10px}
.card-tag{display:inline-block;font-size:10px;padding:2px 6px;border-radius:4px;margin-bottom:3px;font-weight:600}
.tag-c{background:rgba(232,255,107,.15);color:var(--ac)}
.tag-o{background:rgba(74,222,128,.1);color:var(--gr)}
.tag-t{background:rgba(96,165,250,.1);color:#60a5fa}
.tag-x{background:rgba(255,255,255,.05);color:var(--mt)}
.card-size{font-size:11px;color:var(--mt)}
.card-date{font-size:11px;color:var(--mt);margin-top:1px}

.empty,.loading{text-align:center;padding:80px 20px;color:var(--mt);max-width:1200px;margin:0 auto}
.empty h2{font-size:18px;font-weight:500;margin-bottom:8px;color:var(--tx)}
.spin{width:32px;height:32px;border:2px solid #2a2a2a;border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Лайтбокс */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.93);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.lightbox.hidden{display:none}
.lightbox img{max-width:100%;max-height:90dvh;border-radius:8px;object-fit:contain}
.lb-close{position:fixed;top:16px;right:20px;font-size:32px;color:#fff;cursor:pointer;opacity:.6;background:none;border:none;line-height:1;padding:4px}
.lb-del{position:fixed;top:16px;right:64px;font-size:13px;color:var(--rd);background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);padding:6px 14px;border-radius:100px;cursor:pointer}
.lb-info{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);font-size:12px;color:rgba(255,255,255,.45);white-space:nowrap}

/* Прогресс панель */
.progress-panel{position:fixed;bottom:24px;right:24px;background:var(--sf);border:1px solid var(--bd);border-radius:16px;padding:16px 18px;min-width:280px;max-width:360px;z-index:200;display:none;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.progress-panel.show{display:block}
.pp-title{font-size:13px;font-weight:600;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.pp-close{background:none;border:none;color:var(--mt);cursor:pointer;font-size:16px;padding:0}
.pp-jobs{display:flex;flex-direction:column;gap:8px;max-height:300px;overflow-y:auto}
.pj{background:var(--sf2);border:1px solid var(--bd);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:10px;transition:border-color .2s}
.pj.done{border-color:rgba(74,222,128,.3)}
.pj.error{border-color:rgba(248,113,113,.3)}
.pj.running{border-color:rgba(232,255,107,.3)}
.pj-thumb{width:36px;height:36px;border-radius:6px;object-fit:cover;flex-shrink:0;background:var(--bg)}
.pj-info{flex:1;min-width:0}
.pj-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pj-status{font-size:11px;margin-top:2px}
.pj-status.running{color:var(--ac)}.pj-status.done{color:var(--gr)}.pj-status.error{color:var(--rd)}
.pj-spin{width:14px;height:14px;border:2px solid rgba(232,255,107,.2);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
.pj-result{width:36px;height:36px;border-radius:6px;object-fit:cover;cursor:pointer;flex-shrink:0}

/* Панель настроек (API key) */
.settings-bar{max-width:1200px;margin:0 auto 16px;display:flex;align-items:center;gap:8px}
.key-input{flex:1;max-width:300px;background:var(--sf2);border:1px solid var(--bd);border-radius:8px;padding:7px 12px;color:var(--tx);font-size:12px;font-family:monospace}
.key-input:focus{outline:none;border-color:var(--ac)}
.key-label{font-size:12px;color:var(--mt);white-space:nowrap}
.key-save{padding:7px 14px;background:var(--sf2);border:1px solid var(--bd);border-radius:8px;font-size:12px;color:var(--mt);cursor:pointer}
.key-save:hover{color:var(--tx)}
.key-link{font-size:11px;color:var(--ac);text-decoration:none}

/* Модалка */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:300;padding:20px}
.modal-overlay.hidden{display:none}
.modal{background:var(--sf);border:1px solid var(--bd);border-radius:16px;padding:24px;max-width:360px;width:100%;text-align:center}
.modal h3{font-size:16px;font-weight:600;margin-bottom:8px}
.modal p{font-size:13px;color:var(--mt);margin-bottom:20px;line-height:1.5}
.modal-btns{display:flex;gap:10px}
.modal-cancel{flex:1;padding:11px;border:1px solid var(--bd);background:transparent;color:var(--mt);border-radius:10px;font-size:14px;cursor:pointer}
.modal-confirm{flex:1;padding:11px;background:rgba(248,113,113,.15);color:var(--rd);border:1px solid rgba(248,113,113,.3);border-radius:10px;font-size:14px;font-weight:600;cursor:pointer}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--sf2);border:1px solid var(--bd);color:var(--tx);font-size:13px;padding:10px 18px;border-radius:100px;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;z-index:999;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}

.storage-bar{max-width:1200px;margin:0 auto 16px;display:flex;align-items:center;gap:10px;font-size:12px;color:var(--mt)}
.bar-track{flex:1;height:4px;background:var(--sf2);border-radius:2px;overflow:hidden}
.bar-fill{height:100%;background:var(--ac);border-radius:2px;transition:width .5s}
</style>
</head>
<body>

<header>
  <div class="logo">photo<span>.</span>gallery</div>
  <div class="header-right">
    <button class="delete-all-btn" onclick="confirmDeleteAll()">🗑 Очистить всё</button>
    <a href="index.html" class="upload-link">+ загрузить</a>
  </div>
</header>

<!-- Gemini API key -->
<div class="settings-bar">
  <span class="key-label">Gemini API:</span>
  <input type="password" class="key-input" id="gemini-key" placeholder="AIza...">
  <button class="key-save" onclick="saveKey()">Сохранить</button>
  <a href="https://aistudio.google.com/apikey" target="_blank" class="key-link">Получить ключ →</a>
</div>

<!-- Фильтры -->
<div class="toolbar">
  <button class="filter-btn active" onclick="setFilter('all',this)">Все</button>
  <button class="filter-btn" onclick="setFilter('compressed',this)">⚡ Сжатые</button>
  <button class="filter-btn" onclick="setFilter('original',this)">📷 Оригиналы</button>
  <button class="filter-btn" onclick="setFilter('tryon',this)">✨ Try-On</button>
  <span class="count" id="count">...</span>
</div>

<!-- Try-On панель (появляется при выборе фото) -->
<div class="tryon-bar" id="tryon-bar">
  <div class="bar-info" id="bar-info">0 фото выбрано</div>
  <div class="bar-prompt">
    <label>Промт для Gemini</label>
    <textarea class="prompt-input" id="prompt-input" placeholder="Например: надень эту одежду на девушку, заправь в джинсы, покажи спереди на белом фоне...">надень эту одежду на девушку из первого фото, сохрани позу и фон, результат должен выглядеть реалистично</textarea>
  </div>
  <div class="bar-actions">
    <button class="run-btn" id="run-btn" onclick="runTryon()">✨ Примерить</button>
    <button class="clear-sel-btn" onclick="clearSelection()">Снять выбор</button>
  </div>
</div>

<div class="storage-bar" id="storage-bar" style="display:none">
  <span id="storage-used"></span>
  <div class="bar-track"><div class="bar-fill" id="bar-fill" style="width:0%"></div></div>
  <span>1 ГБ</span>
</div>

<div id="root" class="loading"><div class="spin"></div>Загружаем фото...</div>

<!-- Лайтбокс -->
<div class="lightbox hidden" id="lb">
  <button class="lb-close" onclick="closeLb()">×</button>
  <button class="lb-del" onclick="deleteCurrent()">🗑 Удалить</button>
  <img id="lb-img" src="" alt="">
  <div class="lb-info" id="lb-info"></div>
</div>

<!-- Прогресс панель -->
<div class="progress-panel" id="progress-panel">
  <div class="pp-title">
    ✨ Генерация
    <button class="pp-close" onclick="document.getElementById('progress-panel').classList.remove('show')">×</button>
  </div>
  <div class="pp-jobs" id="pp-jobs"></div>
</div>

<!-- Модалка -->
<div class="modal-overlay hidden" id="modal">
  <div class="modal">
    <div class="spin" id="modal-spin" style="display:none;margin-bottom:12px"></div>
    <h3 id="modal-title"></h3>
    <p id="modal-desc"></p>
    <div class="modal-btns" id="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">Отмена</button>
      <button class="modal-confirm" id="modal-ok">Удалить</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://fnwcuhwtforhmhybvscm.supabase.co'
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZud2N1aHd0Zm9yaG1oeWJ2c2NtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3Mjg0MzcsImV4cCI6MjA5MDMwNDQzN30.96-koYH8PvMai0sefi19emXskBYBPYJ-I9IFKWK7N6M'
const EDGE_FN = `${SUPABASE_URL}/functions/v1/gemini-tryon`
const BUCKET = 'photos'
const TEMPLATE_PATH = 'assets/template.jpg' // сюда загрузи шаблон девушки

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)
let allPhotos = [], currentFilter = 'all', selected = new Set(), lbCurrent = null

// ── Utils ──────────────────────────────────────────────────────────────────
function fmt(b){if(!b)return'';b=+b;return b<1024?b+' B':b<1048576?(b/1024).toFixed(1)+' KB':(b/1048576).toFixed(1)+' MB'}
function fmtDate(s){return new Date(s).toLocaleDateString('ru-RU',{day:'numeric',month:'short'})}
function getFolder(f){return f._prefix||'root'}
function getPath(f){return f._prefix?f._prefix+'/'+f.name:f.name}
function toast(m,d=2500){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),d)}
function saveKey(){const v=document.getElementById('gemini-key').value.trim();if(v){localStorage.setItem('gemini_key',v);toast('Ключ сохранён ✓')}}

window.addEventListener('load',()=>{
  const k=localStorage.getItem('gemini_key')
  if(k)document.getElementById('gemini-key').value=k
})

// ── Загрузка ──────────────────────────────────────────────────────────────
async function listFolder(prefix){
  const{data,error}=await sb.storage.from(BUCKET).list(prefix,{limit:1000,sortBy:{column:'created_at',order:'desc'}})
  if(error||!data)return[]
  let files=[]
  for(const item of data){
    if(item.id===null){const sub=await listFolder(prefix?prefix+'/'+item.name:item.name);files=files.concat(sub)}
    else files.push({...item,_prefix:prefix})
  }
  return files
}

async function load(){
  const files=await listFolder('')
  allPhotos=files.filter(f=>
    f.name&&f.name.match(/\.(jpg|jpeg|png|webp|heic|heif)$/i)&&
    !getPath(f).startsWith('assets/')
  )
  allPhotos.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at))
  updateStorageBar();render()
}

function updateStorageBar(){
  let total=0;allPhotos.forEach(f=>{if(f.metadata&&f.metadata.size)total+=+f.metadata.size})
  if(total>0){
    document.getElementById('storage-bar').style.display='flex'
    document.getElementById('storage-used').textContent=fmt(total)+' использовано'
    document.getElementById('bar-fill').style.width=Math.max((total/(1024*1024*1024))*100,.3)+'%'
  }
}

// ── Фильтр и рендер ───────────────────────────────────────────────────────
function setFilter(f,btn){
  currentFilter=f
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'))
  if(btn)btn.classList.add('active')
  render()
}

function render(){
  const root=document.getElementById('root')
  const photos=currentFilter==='all'?allPhotos:allPhotos.filter(f=>getFolder(f)===currentFilter)
  document.getElementById('count').textContent=photos.length+' фото'

  if(!photos.length){
    root.className='empty'
    root.innerHTML='<h2>Нет фото</h2><p>Загрузи фото через страницу загрузки</p>'
    return
  }

  root.className='grid';root.innerHTML=''
  photos.forEach(f=>{
    const path=getPath(f)
    const url=sb.storage.from(BUCKET).getPublicUrl(path).data.publicUrl
    const folder=getFolder(f)
    const tagClass=folder==='compressed'?'tag-c':folder==='original'?'tag-o':folder==='tryon'?'tag-t':'tag-x'
    const tagLabel=folder==='compressed'?'⚡ сжатое':folder==='original'?'📷 оригинал':folder==='tryon'?'✨ try-on':'📁'
    const isSel=selected.has(path)

    const card=document.createElement('div')
    card.className='card'+(isSel?' selected':'')
    card.dataset.path=path
    card.onclick=(e)=>{ if(e.target.closest('.del-btn'))return; toggleSelect(path,card,url,f) }
    card.innerHTML=
      `<img class="thumb" src="${url}" loading="lazy" alt="">
      <div class="select-indicator">${isSel?'✓':''}</div>
      <div class="card-actions">
        <button class="del-btn" title="Удалить" onclick="confirmDeleteOne('${path}',event)">✕</button>
      </div>
      <div class="card-info">
        <span class="card-tag ${tagClass}">${tagLabel}</span>
        <div class="card-size">${fmt(f.metadata&&f.metadata.size)}</div>
        <div class="card-date">${fmtDate(f.created_at)}</div>
      </div>`
    root.appendChild(card)
  })
  updateTryonBar()
}

// ── Выбор фото ────────────────────────────────────────────────────────────
function toggleSelect(path, card, url, f){
  // Двойной клик — открыть лайтбокс
  if(selected.size===0&&!selected.has(path)){
    // Первый клик — выделяем
  }
  if(selected.has(path)){
    selected.delete(path)
    card.classList.remove('selected')
    card.querySelector('.select-indicator').textContent=''
  } else {
    selected.add(path)
    card.classList.add('selected')
    card.querySelector('.select-indicator').textContent='✓'
  }
  updateTryonBar()
}

function updateTryonBar(){
  const bar=document.getElementById('tryon-bar')
  const info=document.getElementById('bar-info')
  if(selected.size>0){
    bar.classList.add('show')
    info.textContent=selected.size+' фото выбрано'
  } else {
    bar.classList.remove('show')
  }
}

function clearSelection(){
  selected.clear()
  document.querySelectorAll('.card.selected').forEach(c=>{
    c.classList.remove('selected')
    c.querySelector('.select-indicator').textContent=''
  })
  updateTryonBar()
}

// ── Try-On ────────────────────────────────────────────────────────────────
async function runTryon(){
  const geminiKey=(document.getElementById('gemini-key').value.trim()||localStorage.getItem('gemini_key')||'').trim()
  if(!geminiKey){toast('Введи Gemini API ключ!',3000);return}
  if(selected.size===0){toast('Выбери хотя бы одно фото');return}

  const prompt=document.getElementById('prompt-input').value.trim()
  if(!prompt){toast('Введи промт');return}

  localStorage.setItem('gemini_key',geminiKey)

  const paths=[...selected]
  document.getElementById('run-btn').disabled=true

  const panel=document.getElementById('progress-panel')
  const jobs=document.getElementById('pp-jobs')
  panel.classList.add('show')

  // Создаём задачи
  const jobEls={}
  for(const path of paths){
    const fname=path.split('/').pop()
    const url=sb.storage.from(BUCKET).getPublicUrl(path).data.publicUrl
    const el=document.createElement('div')
    el.className='pj running'
    el.id='pj-'+btoa(path).slice(0,12)
    el.innerHTML=
      `<img class="pj-thumb" src="${url}" alt="">
      <div class="pj-info">
        <div class="pj-name">${fname}</div>
        <div class="pj-status running" id="pjs-${el.id}">Отправляем в Gemini...</div>
      </div>
      <div class="pj-spin" id="pji-${el.id}"></div>`
    jobs.prepend(el)
    jobEls[path]=el.id
  }

  // Запускаем параллельно (Gemini справляется)
  await Promise.all(paths.map(async path=>{
    const jid=jobEls[path]
    const statusEl=document.getElementById('pjs-'+jid)
    const iconEl=document.getElementById('pji-'+jid)
    try{
      const resp=await fetch(EDGE_FN,{
        method:'POST',
        headers:{'Content-Type':'application/json','x-gemini-key':geminiKey},
        body:JSON.stringify({
          template_path: TEMPLATE_PATH,
          garment_path: path,
          prompt: prompt,
          gemini_key: geminiKey
        })
      })
      const result=await resp.json()
      if(result.ok&&result.url){
        document.getElementById(jid).classList.replace('running','done')
        statusEl.className='pj-status done'
        statusEl.textContent='✓ Готово!'
        iconEl.outerHTML=`<img class="pj-result" src="${result.url}?t=${Date.now()}" onclick="window.open('${result.url}')" title="Открыть">`
        toast('✨ Готово!')
      } else {
        throw new Error(result.error||'Ошибка')
      }
    }catch(err){
      document.getElementById(jid).classList.replace('running','error')
      statusEl.className='pj-status error'
      statusEl.textContent='✗ '+(err.message||'ошибка').slice(0,50)
      iconEl.outerHTML=`<div style="width:8px;height:8px;border-radius:50%;background:var(--rd)"></div>`
    }
  }))

  document.getElementById('run-btn').disabled=false
  clearSelection()
  setTimeout(()=>load(),1000) // обновляем галерею
}

// ── Лайтбокс ─────────────────────────────────────────────────────────────
function openLb(url,path,f){
  lbCurrent={url,path,f}
  document.getElementById('lb-img').src=url
  document.getElementById('lb-info').textContent=f.name+' · '+fmt(f.metadata&&f.metadata.size)
  document.getElementById('lb').classList.remove('hidden')
}
function closeLb(){document.getElementById('lb').classList.add('hidden');lbCurrent=null}
document.getElementById('lb').addEventListener('click',e=>{if(e.target===e.currentTarget)closeLb()})
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closeLb()}})

// ── Удаление ──────────────────────────────────────────────────────────────
function confirmDeleteOne(path,event){
  if(event)event.stopPropagation()
  showModal('Удалить фото?','Это действие нельзя отменить.',async()=>{await deleteFile(path)})
}
function deleteCurrent(){
  if(!lbCurrent)return
  showModal('Удалить фото?','Это действие нельзя отменить.',async()=>{closeLb();await deleteFile(lbCurrent.path)})
}
async function deleteFile(path){
  const{error}=await sb.storage.from(BUCKET).remove([path])
  if(error){toast('Ошибка: '+error.message,3500);return}
  selected.delete(path)
  allPhotos=allPhotos.filter(f=>getPath(f)!==path)
  updateStorageBar();render();toast('Фото удалено')
}
function confirmDeleteAll(){
  if(!allPhotos.length){toast('Нет фото');return}
  showModal('Удалить все фото?',`Будет удалено ${allPhotos.length} фото.`,async()=>{
    const paths=allPhotos.map(f=>getPath(f))
    for(let i=0;i<paths.length;i+=100){
      const{error}=await sb.storage.from(BUCKET).remove(paths.slice(i,i+100))
      if(error){toast('Ошибка: '+error.message,3500);return}
    }
    selected.clear();allPhotos=[];updateStorageBar();render();toast('Все фото удалены')
  })
}

// ── Модалка ───────────────────────────────────────────────────────────────
let modalAction=null
function showModal(title,desc,onConfirm){
  document.getElementById('modal-title').textContent=title
  document.getElementById('modal-desc').textContent=desc
  document.getElementById('modal-spin').style.display='none'
  document.getElementById('modal-btns').style.display='flex'
  modalAction=onConfirm
  document.getElementById('modal-ok').onclick=async()=>{
    document.getElementById('modal-spin').style.display='block'
    document.getElementById('modal-btns').style.display='none'
    document.getElementById('modal-title').textContent='Удаляем...'
    document.getElementById('modal-desc').textContent=''
    await modalAction();closeModal()
  }
  document.getElementById('modal').classList.remove('hidden')
}
function closeModal(){document.getElementById('modal').classList.add('hidden');modalAction=null}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal()})

load()
</script>
</body>
