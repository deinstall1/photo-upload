<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>photo-upload</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#0a0a0a;--sf:#141414;--sf2:#1c1c1c;--bd:#2a2a2a;--ac:#e8ff6b;--adim:rgba(232,255,107,.12);--tx:#f0f0f0;--mt:#666;--r:16px;--gr:#4ade80;--rd:#f87171}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,sans-serif;min-height:100dvh;display:flex;flex-direction:column;align-items:center;padding:24px 16px 40px;-webkit-tap-highlight-color:transparent}
header{width:100%;max-width:480px;display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.logo{font-size:15px;font-weight:600}.logo span{color:var(--ac)}
.gallery-link{font-size:12px;color:var(--mt);text-decoration:none;border:1px solid var(--bd);padding:4px 12px;border-radius:100px}
.quality-bar{width:100%;max-width:480px;margin-bottom:16px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:16px;display:flex;flex-direction:column;gap:12px}
.quality-label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--mt)}
.toggle-row{display:flex;gap:8px}
.toggle-btn{flex:1;padding:10px;border-radius:10px;border:1px solid var(--bd);background:transparent;color:var(--mt);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.toggle-btn.active{background:var(--adim);border-color:var(--ac);color:var(--ac)}
.compress-options{display:none;flex-direction:column;gap:10px}
.compress-options.show{display:flex}
.slider-row{display:flex;align-items:center;gap:10px}
.slider-row label{font-size:12px;color:var(--mt);width:90px;flex-shrink:0}
.slider-row input[type=range]{flex:1}
.slider-val{font-size:12px;font-weight:600;color:var(--ac);width:40px;text-align:right;flex-shrink:0}
.q-hint{font-size:12px;color:var(--mt);line-height:1.5}
.q-hint span{color:var(--tx)}
.drop{width:100%;max-width:480px;aspect-ratio:4/3;border:1.5px dashed var(--bd);border-radius:var(--r);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;cursor:pointer;background:var(--sf);transition:border-color .2s,background .2s;user-select:none}
.drop.over{border-color:var(--ac);background:var(--adim)}
.icon{width:56px;height:56px;background:var(--sf2);border-radius:50%;display:flex;align-items:center;justify-content:center}
.icon svg{width:24px;height:24px;stroke:var(--ac);fill:none;stroke-width:1.8}
.lbl{font-size:16px;font-weight:500}.sub{font-size:13px;color:var(--mt)}
#fi,#ci{display:none}
.or{width:100%;max-width:480px;display:flex;align-items:center;gap:12px;margin:16px 0;color:var(--mt);font-size:13px}
.or::before,.or::after{content:'';flex:1;height:1px;background:var(--bd)}
.cam{width:100%;max-width:480px;padding:16px;background:var(--ac);color:#0a0a0a;border:none;border-radius:var(--r);font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.cam svg{width:18px;height:18px;stroke:#0a0a0a;fill:none;stroke-width:2}
.queue{width:100%;max-width:480px;margin-top:24px;display:flex;flex-direction:column;gap:10px}
.qh{font-size:12px;font-weight:600;text-transform:uppercase;color:var(--mt);padding:0 4px}
.item{background:var(--sf);border:1px solid var(--bd);border-radius:12px;display:flex;align-items:center;gap:12px;padding:10px 12px;transition:border-color .2s}
.item.done{border-color:rgba(74,222,128,.3)}.item.err{border-color:rgba(248,113,113,.3)}.item.up{border-color:rgba(232,255,107,.3)}
.thumb{width:44px;height:44px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--sf2)}
.info{flex:1;min-width:0}.name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sz{font-size:11px;color:var(--mt);margin-top:2px}
.st{flex-shrink:0;display:flex;align-items:center}
.spin{width:16px;height:16px;border:2px solid var(--adim);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ok{width:8px;height:8px;border-radius:50%;background:var(--gr)}
.no{width:8px;height:8px;border-radius:50%;background:var(--rd)}
.stats{width:100%;max-width:480px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:20px}
.stat{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:14px 12px;text-align:center}
.num{font-size:22px;font-weight:600}.llbl{font-size:11px;color:var(--mt);margin-top:2px}
.num.g{color:var(--gr)}.num.r{color:var(--rd)}
.clr{width:100%;max-width:480px;margin-top:12px;padding:13px;background:transparent;color:var(--mt);border:1px solid var(--bd);border-radius:var(--r);font-size:14px;cursor:pointer}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--sf2);border:1px solid var(--bd);color:var(--tx);font-size:13px;padding:10px 18px;border-radius:100px;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;z-index:999;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<header>
  <div class="logo">photo<span>.</span>upload</div>
  <a href="gallery.html" class="gallery-link">галерея →</a>
</header>

<div class="quality-bar">
  <div class="quality-label">Режим загрузки</div>
  <div class="toggle-row">
    <button class="toggle-btn" id="btn-original" onclick="setMode('original')">📷 Оригинал</button>
    <button class="toggle-btn active" id="btn-compress" onclick="setMode('compress')">⚡ Сжатое</button>
  </div>
  <div class="compress-options show" id="compress-opts">
    <div class="slider-row">
      <label>Качество</label>
      <input type="range" id="sl-q" min="50" max="95" value="80" step="5" oninput="updateHint()">
      <span class="slider-val" id="v-q">80%</span>
    </div>
    <div class="slider-row">
      <label>Макс. ширина</label>
      <input type="range" id="sl-w" min="800" max="4000" value="1920" step="200" oninput="updateHint()">
      <span class="slider-val" id="v-w">1920px</span>
    </div>
  </div>
  <div class="q-hint" id="q-hint">Сжатие на устройстве перед загрузкой.<br><span id="hint-txt">Качество 80%, макс. ширина 1920px</span></div>
</div>

<div class="drop" id="drop" onclick="fi.click()">
  <div class="icon"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg></div>
  <div class="lbl">Выбрать фото</div>
  <div class="sub">HEIC · JPG · PNG · WEBP · до 50 МБ</div>
</div>
<input type="file" id="fi" accept="image/jpeg,image/png,image/heic,image/heif,image/webp" multiple>
<div class="or">или</div>
<button class="cam" onclick="ci.click()">
  <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
  Снять на камеру
</button>
<input type="file" id="ci" accept="image/*" capture="environment">

<div class="stats" id="stats" style="display:none">
  <div class="stat"><div class="num" id="nt">0</div><div class="llbl">Всего</div></div>
  <div class="stat"><div class="num g" id="nd">0</div><div class="llbl">Готово</div></div>
  <div class="stat"><div class="num r" id="ne">0</div><div class="llbl">Ошибок</div></div>
</div>
<div class="queue" id="q" style="display:none"><div class="qh">Очередь</div></div>
<button class="clr" id="clr" style="display:none" onclick="rst()">Очистить список</button>
<div class="toast" id="toast"></div>

<script>
const sb = supabase.createClient(
  'https://fnwcuhwtforhmhybvscm.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZud2N1aHd0Zm9yaG1oeWJ2c2NtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3Mjg0MzcsImV4cCI6MjA5MDMwNDQzN30.96-koYH8PvMai0sefi19emXskBYBPYJ-I9IFKWK7N6M'
);

let mode = 'compress';
let T=0,D=0,E=0;

function setMode(m) {
  mode = m;
  document.getElementById('btn-original').classList.toggle('active', m==='original');
  document.getElementById('btn-compress').classList.toggle('active', m==='compress');
  document.getElementById('compress-opts').classList.toggle('show', m==='compress');
  updateHint();
}

function updateHint() {
  const q = document.getElementById('sl-q').value;
  const w = document.getElementById('sl-w').value;
  document.getElementById('v-q').textContent = q + '%';
  document.getElementById('v-w').textContent = w + 'px';
  document.getElementById('hint-txt').textContent = mode==='compress'
    ? 'Качество ' + q + '%, макс. ширина ' + w + 'px'
    : 'Файл загружается без изменений';
}

async function compressImage(file) {
  const quality = parseInt(document.getElementById('sl-q').value) / 100;
  const maxW = parseInt(document.getElementById('sl-w').value);
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      let w = img.width, h = img.height;
      if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      canvas.toBlob(blob => {
        if (!blob) { reject(new Error('canvas error')); return; }
        resolve(new File([blob], file.name.replace(/\.[^.]+$/, '.jpg'), {type:'image/jpeg'}));
      }, 'image/jpeg', quality);
    };
    img.onerror = reject;
    img.src = url;
  });
}

function fb(b){return b<1024?b+' B':b<1048576?(b/1024).toFixed(1)+' KB':(b/1048576).toFixed(1)+' MB'}
function toast(m,d=2500){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),d)}
function show(){q.style.display='flex';stats.style.display='grid';clr.style.display='block'}
function upd(){nt.textContent=T;nd.textContent=D;ne.textContent=E}

const drop=document.getElementById('drop');
drop.addEventListener('dragover',e=>{e.preventDefault();drop.classList.add('over')});
drop.addEventListener('dragleave',()=>drop.classList.remove('over'));
drop.addEventListener('drop',e=>{e.preventDefault();drop.classList.remove('over');go([...e.dataTransfer.files])});
fi.onchange=e=>go([...e.target.files]);
ci.onchange=e=>go([...e.target.files]);

function go(files) {
  if (!files.length) return;
  show();
  files.forEach(f => {
    if (!f.type.startsWith('image/') && !f.name.match(/\.heic$/i)) return;
    const id='i'+Date.now()+Math.floor(Math.random()*1e6);
    const r=new FileReader();
    r.onload=ev=>{
      T++;upd();
      const el=document.createElement('div');el.className='item up';
      el.innerHTML='<img class="thumb" src="'+ev.target.result+'">'
        +'<div class="info"><div class="name">'+f.name+'</div>'
        +'<div class="sz" id="sz'+id+'">'+fb(f.size)+(mode==='compress'?' → сжимаем...':' · оригинал')+'</div></div>'
        +'<div class="st" id="'+id+'"><div class="spin"></div></div>';
      q.appendChild(el);
      up(f,id,el);
    };
    r.readAsDataURL(f);
  });
}

async function up(f,id,el) {
  let file=f;
  const szEl=document.getElementById('sz'+id);
  if (mode==='compress') {
    try {
      file=await compressImage(f);
      if(szEl) szEl.textContent=fb(f.size)+' → '+fb(file.size);
    } catch(e) {
      file=f;
      if(szEl) szEl.textContent=fb(f.size)+' · оригинал';
    }
  }
  const folder=mode==='compress'?'compressed/':'original/';
  const p=folder+new Date().toISOString().replace(/[:.]/g,'-')+'_'+Math.random().toString(36).slice(2)+'.'+file.name.split('.').pop();
  const{error:e}=await sb.storage.from('photos').upload(p,file,{contentType:file.type||'image/jpeg',upsert:false});
  const s=document.getElementById(id);
  if(e){E++;upd();el.classList.replace('up','err');if(s)s.innerHTML='<div class="no"></div>';toast('Ошибка: '+e.message,3500);}
  else{D++;upd();el.classList.replace('up','done');if(s)s.innerHTML='<div class="ok"></div>';toast(D===1?'Загружено!':D+' фото готово');}
}

function rst(){T=0;D=0;E=0;upd();[...q.children].filter(c=>!c.classList.contains('qh')).forEach(c=>c.remove());[q,stats,clr].forEach(el=>el.style.display='none');fi.value='';ci.value='';}

updateHint();
</script>
</body>
</html>
